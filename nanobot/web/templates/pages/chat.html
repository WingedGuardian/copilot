{% extends "base.html" %}
{% block title %}Chat — Nanobot{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-3rem)]">

  <div class="flex items-center justify-between mb-4">
    <h1 class="text-nb-accent text-lg font-semibold tracking-wide">Chat</h1>
    <span id="ws-status" class="text-nb-muted text-xs font-mono">connecting…</span>
  </div>

  <!-- Message list -->
  <div id="messages" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4">
    <p class="text-nb-muted text-xs italic">Connect to start chatting with your copilot.</p>
  </div>

  <!-- Input bar -->
  <form id="chat-form" class="flex gap-2">
    <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off"
      class="flex-1 bg-nb-surface border border-nb-border rounded px-3 py-2 text-nb-text text-sm font-mono placeholder-nb-muted focus:outline-none focus:border-nb-accent"/>
    <button type="submit"
      class="px-4 py-2 bg-nb-surface border border-nb-border rounded text-nb-text text-sm hover:border-nb-accent hover:text-nb-accent transition-colors">
      Send
    </button>
  </form>

</div>

<script>
(function () {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
  const messages = document.getElementById('messages');
  const status   = document.getElementById('ws-status');
  const form     = document.getElementById('chat-form');
  const input    = document.getElementById('chat-input');

  function addMessage(role, content) {
    // Remove placeholder text on first real message
    const placeholder = messages.querySelector('p.italic');
    if (placeholder) placeholder.remove();

    const div = document.createElement('div');
    div.className = 'flex gap-2 text-sm' + (role === 'user' ? ' justify-end' : '');

    const bubble = document.createElement('div');
    if (role === 'user') {
      bubble.className = 'bg-nb-accent/10 border border-nb-accent/20 text-nb-text rounded px-3 py-2 max-w-2xl text-xs whitespace-pre-wrap';
    } else {
      bubble.className = 'bg-nb-surface border border-nb-border text-nb-text rounded px-3 py-2 max-w-2xl text-xs font-mono whitespace-pre-wrap';
    }
    bubble.textContent = content;

    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  ws.onopen  = () => { status.textContent = 'connected';    status.className = 'text-nb-green text-xs font-mono'; };
  ws.onclose = () => { status.textContent = 'disconnected'; status.className = 'text-nb-red text-xs font-mono'; };
  ws.onerror = () => { status.textContent = 'error';        status.className = 'text-nb-red text-xs font-mono'; };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'message' && data.role !== 'user') {
        addMessage(data.role, data.content);
      } else if (data.type === 'error') {
        addMessage('assistant', '⚠ ' + data.content);
      }
    } catch {
      addMessage('assistant', event.data);
    }
  };

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;
    addMessage('user', text);
    ws.send(text);
    input.value = '';
    input.focus();
  });

  // Allow Shift+Enter for multi-line (optional: send on Enter)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });
})();
</script>
{% endblock %}
